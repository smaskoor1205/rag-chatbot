[tool.ruff]
target-version = "py311"
line-length = 120
src = ["."]
exclude = [
  ".git",
  ".venv",
  "node_modules",
  "client",
  "server",
  "local_rag_data",
  "streamlit_data",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"

[tool.mypy]
python_version = "3.11"
files = ["app.py"]
ignore_missing_imports = true
follow_imports = "skip"
check_untyped_defs = true
no_implicit_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
exclude = "(client|server|node_modules|local_rag_data|streamlit_data|__pycache__)/"
